name: Immich macOS Package

on:
  # Trigger the workflow on pushes and pull requests to main branches
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - master
  # Optionally, manually trigger the workflow
  workflow_dispatch:

jobs:
  build_pkg:
    name: Create Immich package for macOS
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Install Homebrew
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          brew install \
            mise \
            node \
            pnpm \
            postgresql@17 \
            python@3.11 \
            rustup \
            uv \
            vips

      # Step 4: Cache build dependencies
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Cache mise tool installs
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('**/plugins/mise.toml') }}
          restore-keys: mise-${{ runner.os }}-

      # Step 5: Create Immich package
      - name: Create Immich package
        run: ./build_pkg.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: immich-pkg
          path: "./output/Unofficial Immich Installer *.pkg"

  test_pkg:
    name: Test package installation
    runs-on: macos-latest
    needs: build_pkg

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: immich-pkg

      - name: Install package
        run: |
          pkg_file="$(ls Unofficial\ Immich\ Installer\ *.pkg)"
          sudo installer -pkg "$pkg_file" -target /

      - name: Verify installation
        run: |
          set -eux

          # Verify core directories exist
          test -d /opt/immich/share/server
          test -d /opt/immich/share/machine-learning
          test -d /opt/immich/share/cli
          test -d /opt/immich/share/build/www
          test -d /opt/immich/share/build/geodata
          test -d /opt/immich/share/build/corePlugin

          # Verify VectorChord extension was packaged
          test -d /opt/immich/share/vectorchord/lib
          test -d /opt/immich/share/vectorchord/extension

          # Verify ffmpeg binaries
          test -x /opt/immich/bin/ffmpeg
          test -x /opt/immich/bin/ffprobe

          # Verify start scripts
          test -x /opt/immich/share/server/start.sh
          test -x /opt/immich/share/machine-learning/start.sh

          # Verify config
          test -f /opt/immich/etc/immich_server.env

          # Verify launchd plists
          test -f /Library/LaunchDaemons/com.immich.plist
          test -f /Library/LaunchDaemons/com.immich.machine.learning.plist

          # Verify immich user was created
          dscl . -list /Users/immich

          echo "All installation checks passed"

  release_pkg:
    name: Release package
    runs-on: macos-latest
    needs: test_pkg
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: immich-pkg

      - name: Release prebuilt package
        uses: softprops/action-gh-release@v2
        with:
          files: "./Unofficial Immich Installer *.pkg"
