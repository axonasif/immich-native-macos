name: Immich macOS Package

on:
  # Trigger the workflow on pushes and pull requests to main branches
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
    branches:
      - master
  # Optionally, manually trigger the workflow
  workflow_dispatch:

jobs:
  build_pkg:
    name: Create Immich package for macOS
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Install Homebrew
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          brew install \
            mise \
            node \
            pnpm \
            python@3.11 \
            uv \
            vips

      # Step 4: Cache build dependencies
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Cache mise tool installs
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: mise-${{ runner.os }}-${{ hashFiles('**/plugins/mise.toml') }}
          restore-keys: mise-${{ runner.os }}-

      # Step 5: Create Immich package
      - name: Create Immich package
        run: ./build_pkg.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 6: Release prebuilt package
      - name: Release prebuilt package
        uses: softprops/action-gh-release@v2
        with:
          files: "./output/Unofficial Immich Installer *.pkg"
